<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Toufan Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--s1:#101010;--s2:#181818;--s3:#222;--s4:#2a2a2a;
  --border:#2c2c2c;--border2:#1e1e1e;
  --gold:#f0a500;--gold2:#ffc840;
  --cyan:#00d4ff;--green:#00e676;--orange:#ff6d00;
  --red:#ff1744;--blue:#2979ff;--purple:#d500f9;
  --text:#f0f0f0;--text2:#888;--text3:#444;
}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Rajdhani',sans-serif}

/* ── LOADER ───────────────────────────────────────── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--text3);letter-spacing:3px}

/* ── LOGIN ────────────────────────────────────────── */
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-logo{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:var(--gold);letter-spacing:4px}
.login-sub{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:28px 22px;width:100%;max-width:380px}

/* ── FORMS ────────────────────────────────────────── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.form-control{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Exo 2',sans-serif;outline:none;transition:border-color .2s}
.form-control:focus{border-color:var(--gold)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.form-hint{font-size:10px;color:var(--text3);margin-top:3px}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

/* ── BUTTONS ──────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;transition:all .15s;width:100%}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-cyan{background:var(--cyan);color:#000}
.btn-orange{background:var(--orange);color:#fff}
.btn-wa{background:#25d366;color:#fff}
.btn-ghost{background:var(--s3);border:1px solid var(--border);color:var(--text2)}
.btn-sm{padding:5px 12px;font-size:12px;width:auto}
.btn-xs{padding:3px 8px;font-size:11px;width:auto}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}

/* ── APP SHELL ────────────────────────────────────── */
#app-shell{display:none}
#app-shell.visible{display:block}

/* ── TOPBAR ───────────────────────────────────────── */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 8px;cursor:pointer}
.user-dot{width:7px;height:7px;background:var(--green);border-radius:50%}
.user-name{font-size:12px;color:var(--text2)}
.role-badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}

/* ── BOTTOM NAV ───────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:9px;border:none;background:none;transition:color .15s;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.nav-btn.active{color:var(--gold)}
.nav-icon{font-size:19px;line-height:1}

/* ── PAGES ────────────────────────────────────────── */
.page{display:none;padding:12px;padding-bottom:76px;max-width:960px;margin:0 auto}
.page.active{display:block}

/* ── CARDS ────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px}

/* ── TABS ─────────────────────────────────────────── */
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:8px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:7px 8px;border:none;background:none;color:var(--text2);border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;transition:all .15s;text-align:center}
.tab.active{background:var(--gold);color:#000}

/* ── OVERLAYS ─────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:620px;max-height:93vh;overflow-y:auto;padding:20px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold)}
.modal-close{background:var(--s3);border:1px solid var(--border);color:var(--text2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.fsec{background:var(--s2);border-radius:10px;padding:14px;margin-bottom:12px}
.fsec-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* ── KV PAIRS ─────────────────────────────────────── */
.kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border2);font-size:13px}
.kv:last-child{border-bottom:none}
.kv-l{color:var(--text2)}
.kv-v{font-weight:600;text-align:right;max-width:60%}

/* ── TOAST ────────────────────────────────────────── */
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:13px;opacity:0;transition:all .25s;z-index:500;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── STATUS COLORS ────────────────────────────────── */
.status-diagnostic{color:var(--red)}
.status-service{color:var(--orange)}
.status-waiting{color:var(--purple)}
.status-quality{color:var(--blue)}
.status-testdrive{color:var(--cyan)}
.status-ready{color:var(--green)}
.status-paid{color:var(--text3)}
.status-hold{color:var(--text2)}

/* ── ROLE TAGS ────────────────────────────────────── */
.role-tag{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.role-admin,.role-manager{background:rgba(213,0,249,.12);color:var(--purple);border:1px solid rgba(213,0,249,.2)}
.role-advisor{background:rgba(240,165,0,.12);color:var(--gold);border:1px solid rgba(240,165,0,.2)}
.role-mechanic{background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.role-tyres{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.role-electrician{background:rgba(255,214,0,.12);color:#ffd600;border:1px solid rgba(255,214,0,.2)}
.role-supervisor{background:rgba(255,109,0,.12);color:var(--orange);border:1px solid rgba(255,109,0,.2)}
.role-detailer,.role-denter,.role-bodywork{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.2)}
.role-cashier,.role-reception,.role-inventory,.role-cleaner{background:rgba(136,136,136,.12);color:#888;border:1px solid rgba(136,136,136,.2)}

/* ── RECEPTION BOARD ──────────────────────────────── */
.board-scroll{overflow-x:auto;padding-bottom:8px}
.board-cols{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:8px;min-width:900px}
.board-col{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.board-col-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.board-col-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.board-col-cnt{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;opacity:.3}
.board-col-body{padding:8px;min-height:80px}
.board-card{background:var(--s2);border-radius:7px;padding:9px 10px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);transition:border-color .15s}
.board-card:hover{border-color:var(--gold)}
.board-card.urgent{border-left:3px solid var(--red)}
.board-card.express{border-left:3px solid var(--orange)}
.board-plate{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold)}
.board-vehicle{font-size:11px;color:var(--text2);margin-top:1px}
.board-customer{font-size:11px;color:var(--text3);margin-top:2px}
.board-mechanic{font-size:10px;color:var(--cyan);margin-top:2px}

/* ── JOB CARDS LIST ───────────────────────────────── */
.job-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.job-card:hover{border-color:var(--gold)}
.job-card.urgent{border-left:3px solid var(--red)}
.job-card.express{border-left:3px solid var(--orange)}
.job-plate{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold)}
.job-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
.job-tag{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}

/* ── STAFF ROWS ───────────────────────────────────── */
.staff-row{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid var(--border)}
.staff-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;flex-shrink:0}
.staff-info{flex:1;min-width:0}
.staff-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staff-det{font-size:11px;color:var(--text2)}
.staff-acts{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── LINE ITEMS ───────────────────────────────────── */
.line-row{display:grid;grid-template-columns:2fr 55px 85px 80px 30px;gap:5px;margin-bottom:5px;align-items:center}
.line-total{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold);text-align:right;padding:8px 4px;background:var(--s2);border-radius:6px}
.line-del{background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:var(--red);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12px}

/* ── TOTAL BOX ────────────────────────────────────── */
.total-box{background:var(--s2);border-radius:10px;padding:12px}
.total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.total-row.vat{color:var(--orange)}
.total-final{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px;margin-top:6px}
.total-label{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700}
.total-amount{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--gold)}

/* ── STATS GRID ───────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700}

/* ── LOG ──────────────────────────────────────────── */
.log-item{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border2);font-size:11px}
.log-time{color:var(--text3);flex-shrink:0;width:60px}
.log-msg{color:var(--text2)}

/* ── DISPATCH ─────────────────────────────────────── */
.dispatch-grid{display:grid;gap:8px;overflow-x:auto}
.dispatch-col{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px;min-width:160px}
.dispatch-head{text-align:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.dispatch-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700}
.dispatch-cnt{font-size:10px;color:var(--text3);margin-top:2px}

/* ── PRIORITY TAG ─────────────────────────────────── */
.ptag-urgent{background:rgba(255,23,68,.15);color:var(--red);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:1px}
.ptag-express{background:rgba(255,109,0,.15);color:var(--orange);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:1px}

/* ── EMPTY STATE ──────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:1px}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text">LOADING TOUFAN SYSTEM...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">🔥 TOUFAN</div>
  <div class="login-sub">Workshop Management System</div>
  <div class="login-card">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="login-pass" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" onclick="doLogin()">LOGIN</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">🔥 TOUFAN</div>
    <div class="user-chip" onclick="doLogout()">
      <div class="user-dot"></div>
      <span class="user-name" id="topbar-name">-</span>
      <span class="role-badge" id="topbar-role">-</span>
    </div>
  </div>
  <!-- PAGES -->
  <div id="page-reception" class="page"></div>
  <div id="page-jobs" class="page"></div>
  <div id="page-dispatch" class="page"></div>
  <div id="page-cashier" class="page"></div>
  <div id="page-inventory" class="page"></div>
  <div id="page-reminders" class="page"></div>
  <div id="page-settings" class="page"></div>
  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- MAIN MODAL (job detail, new job, etc) -->
<div class="overlay" id="overlay-main" onclick="handleOverlayClick(event,'overlay-main')">
  <div class="modal" id="modal-main">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">-</div>
      <button class="modal-close" onclick="closeModal('overlay-main')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- SECONDARY MODAL (edit staff, etc) -->
<div class="overlay" id="overlay-sec" onclick="handleOverlayClick(event,'overlay-sec')">
  <div class="modal" id="modal-sec">
    <div class="modal-head">
      <div class="modal-title" id="modal-sec-title">-</div>
      <button class="modal-close" onclick="closeModal('overlay-sec')">✕</button>
    </div>
    <div id="modal-sec-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

// ═══════════════════════════════════════════════════════

let _authDone = false;
setTimeout(() => { if (!_authDone) { hideLoader(); showLogin(); } }, 5000);

auth.onAuthStateChanged(async user => {
  _authDone = true;
  hideLoader();
  if (user) {
    currentUser = user;
    await loadProfile(user.uid);
    showApp();
  } else {
    showLogin();
  }
});

function hideLoader() { document.getElementById('loader').style.display = 'none'; }
function showLogin()  { document.getElementById('login-screen').style.display = 'flex'; }

async function loadProfile(uid) {
  const email = (auth.currentUser?.email || '').toLowerCase().trim();
  const snap = await db.ref('staff/' + uid).once('value');
  if (snap.exists()) {
    currentProfile = snap.val();
    currentProfile.uid = uid;
    const correct = CORRECT_STAFF_DATA[email];
    if (correct && (!currentProfile.name || currentProfile.name === 'Admin')) {
      Object.assign(currentProfile, correct);
      db.ref('staff/' + uid).update({ name:correct.name, role:correct.role, branch:correct.branch });
    }
    return;
  }
  const emailKey = email.replace(/[@.]/g, '_');
  const snap2 = await db.ref('staff/' + emailKey).once('value');
  if (snap2.exists()) {
    currentProfile = snap2.val();
    currentProfile.uid = uid;
    await db.ref('staff/' + uid).set(currentProfile);
    await db.ref('staff/' + emailKey).remove();
    return;
  }
  const correct = CORRECT_STAFF_DATA[email];
  if (correct) {
    currentProfile = { ...correct, uid, email };
    await db.ref('staff/' + uid).set(currentProfile);
    return;
  }
  const nameFallback = email === 'info@toufantyres.ae' ? 'Anne'
    : (email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1));
  currentProfile = { name:nameFallback, role:email==='info@toufantyres.ae'?'admin':'mechanic', branch:'TAC', uid, email };
  await db.ref('staff/' + uid).set(currentProfile);
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email||!pass) { errEl.textContent='Enter email and password'; return; }
  auth.signInWithEmailAndPassword(email, pass).catch(() => { errEl.textContent='Invalid email or password'; });
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogout() { if(confirm('Log out?')) auth.signOut().then(()=>location.reload()); }

// ============ PAGE SWITCHING ============
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll(`.nav-btn[data-page="${id}"]`).forEach(b => b.classList.add('active'));
  if (id === 'home') renderHome();
  else if (id === 'jobs') renderJobsPage();
  else if (id === 'reception') renderReception();
  else if (id === 'dispatch') renderDispatch();
  else if (id === 'settings') renderSettings();
  else if (id === 'inventory') renderInventory();
  else if (id === 'cashier') renderCashier();
  else if (id === 'reminders') renderOilReminders();
}

// ============ REALTIME LISTENERS ============
function listenToJobs() {
  db.ref('jobs').on('value', snap => {
    allJobs = snap.val() || {};
    refreshCurrentPage();
  });
}

function listenToStaff() {
  db.ref('staff').on('value', snap => {
    allStaff = snap.val() || {};
    refreshCurrentPage();
  });
}

function refreshCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id.replace('page-','');
  if (id === 'home') renderHome();
  else if (id === 'jobs') renderJobsPage();
  else if (id === 'reception') renderReception();
  else if (id === 'dispatch') renderDispatch();
  else if (id === 'inventory') renderInventory();
  else if (id === 'cashier') renderCashier();
  else if (id === 'reminders') renderOilReminders();
}

// ============ FILTER JOBS ============
function getMyJobs() {
  const jobs = Object.values(allJobs);
  const role = currentProfile?.role;
  const uid = currentUser?.uid;
  if (role === 'admin' || role === 'supervisor' || role === 'manager') return jobs;
  if (role === 'advisor') return jobs.filter(j => j.advisorUid === uid || j.branch === currentProfile.branch);
  if (role === 'mechanic' || role === 'tyres') return jobs.filter(j => j.mechanicUid === uid);
  if (role === 'reception') return jobs.filter(j => j.branch === currentProfile.branch);
  return jobs;
}

  } else {
    // Recent jobs
    html += `<div class="sec-head"><div class="sec-title">Recent Jobs</div></div>`;
    const recent = jobs.slice().sort((a,b) => (b.createdAt||0)-(a.createdAt||0)).slice(0,5);
    html += recent.length ? recent.map(j => jobCardHTML(j)).join('') : `<div style="text-align:center;padding:30px;color:var(--text3)">No jobs yet</div>`;
  }
  document.getElementById('home-content').innerHTML = html;
}

function renderJobsPage() {
  const jobs = getMyJobs();
  const role = currentProfile?.role;
  document.getElementById('jobs-page-title').textContent = ['admin','supervisor','manager'].includes(role) ? 'All Jobs' : 'Branch Jobs';

  // Filter chips
  const counts = {all:jobs.length};
  Object.keys(STATUS_CFG).forEach(s => counts[s] = jobs.filter(j=>j.status===s).length);
  const filterDiv = document.getElementById('jobs-filter');
  filterDiv.innerHTML = ['all','diagnostic','service','quality','testdrive','ready','hold','waiting','paid'].map(s => {
    const sc = STATUS_CFG[s];
    const active = currentJobFilter === s ? 'style="background:var(--gold);color:#000;"' : '';
    return `<button ${active} onclick="setJobFilter('${s}')" style="background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.5px;">${sc?sc.icon+' ':''} ${s.toUpperCase()} (${counts[s]||0})</button>`;
  }).join('');

  const filtered = currentJobFilter === 'all' ? jobs : jobs.filter(j=>j.status===currentJobFilter);
  const sorted = filtered.slice().sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
  document.getElementById('jobs-list').innerHTML = sorted.length ? sorted.map(j => jobCardHTML(j)).join('') : `<div style="text-align:center;padding:30px;color:var(--text3)">No jobs</div>`;
}

function setJobFilter(f) { currentJobFilter = f; renderJobsPage(); }

function recalcUpdTotal() {
  const sub = parseFloat(document.getElementById('upd-subtotal')?.value)||0;
  const vat = document.getElementById('upd-vat')?.value === 'yes' ? sub*0.05 : 0;
  const total = sub + vat;
  const el = document.getElementById('upd-total-display');
  const hidden = document.getElementById('upd-amount');
  if (el) el.textContent = 'AED ' + total.toFixed(2);
  if (hidden) hidden.value = total;
}

function addUpdSvcLine() {
  addUpdSvcLineItem('', 1, 0);
}

function addUpdSvcLineItem(desc='', qty=1, price=0) {
  const list = document.getElementById('upd-services-list');
  if (!list) return;
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:1fr 60px 80px 30px;gap:4px;margin-bottom:5px;align-items:center;';
  div.innerHTML = `
    <input type="text" class="form-control upd-svc" placeholder="Service or part..." value="${desc}" style="font-size:12px;padding:7px 9px;">
    <input type="number" class="form-control upd-qty" value="${qty}" min="1" oninput="calcUpdTotal()" style="font-size:12px;padding:7px;text-align:center;">
    <input type="number" class="form-control upd-price" value="${price||''}" placeholder="0" oninput="calcUpdTotal()" style="font-size:12px;padding:7px;text-align:right;">
    <button onclick="this.parentElement.remove();calcUpdTotal();" style="background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);color:var(--red);border-radius:6px;padding:5px 7px;cursor:pointer;font-size:12px;line-height:1;">✕</button>`;
  list.appendChild(div);
}

function calcUpdTotal() {
  const qtys = [...document.querySelectorAll('.upd-qty')].map(i=>parseFloat(i.value)||0);
  const prices = [...document.querySelectorAll('.upd-price')].map(i=>parseFloat(i.value)||0);
  let total = 0;
  qtys.forEach((q,i) => total += q * prices[i]);
  const el = document.getElementById('upd-est-total');
  if (el) el.textContent = 'AED ' + total.toFixed(2);
  // Also update amount field if present
  const amtEl = document.getElementById('upd-amount');
  if (amtEl && total > 0) amtEl.value = total.toFixed(2);
}

  if (!job) return;
  const newStatus = document.getElementById('upd-status')?.value || job.status;
  const mechEl = document.getElementById('upd-mechanic');
  const note = document.getElementById('upd-note')?.value || '';
  const invoiceEl = document.getElementById('upd-invoice');
  const amountEl = document.getElementById('upd-amount');

  const updates = { status: markPaidFlag ? 'paid' : newStatus };
  if (markPaidFlag) { updates.paid = true; updates.paidDate = todayStr(); }
  if (invoiceEl) updates.invoice = invoiceEl.value;
  if (amountEl) updates.amount = parseFloat(amountEl.value)||0;

  // Mechanic reassignment
  let newMechUid = null, newMechName = null;
  if (mechEl && mechEl.value) {
    newMechUid = mechEl.value;
    // Get name from allStaff by UID - most reliable
    const mechS = Object.values(allStaff).find(s=>s.uid===newMechUid);
    newMechName = mechS ? mechS.name : (mechEl.options[mechEl.selectedIndex]?.dataset?.name || mechEl.options[mechEl.selectedIndex]?.text?.split(' (')[0] || '');
    updates.mechanicUid = newMechUid;
    updates.mechanic = newMechName;
  }

  const log = job.log || [];
  if (note) log.push({time:nowTime(), msg: note});
  log.push({time:nowTime(), msg:`Status → ${STATUS_CFG[updates.status]?.label||updates.status}`});
  if (markPaidFlag) log.push({time:nowTime(), msg:`💰 Payment received AED ${updates.amount||job.amount||0}`});
  if (newMechName && newMechName !== job.mechanic) log.push({time:nowTime(), msg:`🔧 Assigned to ${newMechName}`});
  updates.log = log;

  // Save edited services with price
  const svcInputs = document.querySelectorAll('.upd-svc');
  if (svcInputs.length > 0) {
    const updQtys = [...document.querySelectorAll('.upd-qty')].map(i=>parseFloat(i.value)||1);
    const updPrices = [...document.querySelectorAll('.upd-price')].map(i=>parseFloat(i.value)||0);
    const updDescs = [...svcInputs].map(i=>i.value);
    updates.serviceItems = updDescs.map((d,i)=>({desc:d,qty:updQtys[i],price:updPrices[i]})).filter(i=>i.desc);
    updates.services = updates.serviceItems.map(i => i.price > 0 ? `${i.desc} (x${i.qty} @ AED ${i.price})` : i.desc);
    const newTotal = updates.serviceItems.reduce((s,i)=>s+(i.qty*i.price),0);
    if (newTotal > 0 && !updates.amount) updates.amount = newTotal;
    if (updates.services.length > 0) log.push({time:nowTime(), msg:`✏️ Services updated by ${currentProfile?.name}`});
  }
  updates.log = log;

  await db.ref('jobs/' + id).update(updates);
  closeOverlay('overlay-update');
  showToast('Job updated!');

  // Notify mechanic on assignment
  if (newMechUid && newMechName && newMechName !== job.mechanic) {
    const mechProfile = Object.values(allStaff).find(s=>s.uid===newMechUid);
    if (mechProfile?.phone) {
      const mMsg = `🔧 Dear ${newMechName}, you have been assigned a new job!\n\nJob: *${job.id}*\n🚗 Vehicle: *${job.vehicle}* (${job.plate})\n⚙️ Services: ${(job.services||[]).join(', ')}\n📍 Branch: ${BRANCHES[job.branch]}\n\nPlease check the workshop board. 🔥 *Toufan*`;
      setTimeout(() => window.open(`https://wa.me/${mechProfile.phone.replace(/\D/g,'')}?text=${encodeURIComponent(mMsg)}`,'_blank'), 500);
    }
  }

  if (notify && job.phone) {
    const phone = job.phone.replace(/\D/g,'');
    const bd = BRANCH_DETAILS[job.branch] || BRANCH_DETAILS.TAC;
    let msg = '';
    if (markPaidFlag) {
      msg = `🎉 Dear ${job.customer},\n\nThank you for choosing *${bd.name}*!\n\nYour payment of *AED ${(updates.amount||job.amount||0).toLocaleString()}* has been received.\n\n📋 Receipt: *${updates.invoice||job.invoice||'-'}*\n🚗 Vehicle: *${job.vehicle}* (${job.plate})\n\nWe look forward to serving you again! 🔥\n\n📍 ${bd.address}\n📞 ${bd.phone}`;
      // Auto Google Review request after payment
      setTimeout(() => sendGoogleReview(job), 3000);
      // Auto create oil change reminder if services include oil change
      if ((job.services||[]).some(s => /oil.?change|oil.?service|engine.?oil|lube/i.test(s))) {
        autoCreateOilReminder(job, updates.amount||job.amount);
      }
      // Also notify advisor
      const adv = Object.values(allStaff).find(s=>s.uid===job.advisorUid);
      if (adv?.phone) {
        const aMsg = `💰 Payment received!\nVehicle: *${job.vehicle}* (${job.plate})\nCustomer: ${job.customer}\nAmount: *AED ${updates.amount||job.amount}*\nInvoice: ${updates.invoice||job.invoice}\n🔥 Toufan System`;
        setTimeout(() => window.open(`https://wa.me/${adv.phone.replace(/\D/g,'')}?text=${encodeURIComponent(aMsg)}`,'_blank'), 1200);
      }
    } else if (updates.status === 'ready') {
      const bd2 = BRANCH_DETAILS[job.branch]||BRANCH_DETAILS.TAC;
      const finalTotal = updates.amount||job.amount||0;
      const finalSub = job.subtotal||0;
      const finalVat = job.vatAmount||0;
      msg = `✅ Dear ${job.customer},\n\nGreat news! Your *${job.vehicle}* (${job.plate}) is *READY FOR COLLECTION!* 🎉\n\n📋 Invoice: *${updates.invoice||job.invoice||'-'}*\n💵 Subtotal: AED ${finalSub.toFixed(2)}\n🧾 VAT (5%): AED ${finalVat.toFixed(2)}\n💰 *TOTAL: AED ${finalTotal.toLocaleString()}*\n\nPlease proceed to the billing counter at:\n📍 *${bd2.name}*\n${bd2.address}\n📞 ${bd2.phone}\n\n🔥 *Toufan Garage*`;
      // Auto Google Review request after ready
      setTimeout(() => sendGoogleReview(job), 2500);
      // Auto create oil change reminder
      if ((job.services||[]).some(s => /oil.?change|oil.?service|engine.?oil|lube/i.test(s))) {
        autoCreateOilReminder(job, updates.amount||job.amount);
      }
    } else {
      const sc = STATUS_CFG[updates.status];
      const statusEmojis = {diagnostic:'⚙️',service:'🔧',quality:'🔍',testdrive:'🚗',hold:'⏸️',waiting:'📦'};
      const emoji = statusEmojis[updates.status]||'📊';
      msg = `${emoji} Dear ${job.customer},\n\nUpdate on your *${job.vehicle}* (${job.plate}):`;
      if (updates.status==='testdrive') {
        msg += `\n\n🚗 Your vehicle is currently on a *Test Drive* — almost ready!`;
      } else if (updates.status==='quality') {
        msg += `\n\n🔍 Your vehicle is undergoing *Quality Check* — final inspection in progress.`;
      } else if (updates.status==='service') {
        msg += `\n\n🔧 Your vehicle is now *In Service* — our team is working on it.`;
      } else if (updates.status==='diagnostic') {
        msg += `\n\n⚙️ Your vehicle is currently being *Diagnosed* by our technicians.`;
      } else if (updates.status==='waiting') {
        msg += `\n\n📦 We are *Waiting for Parts* to arrive for your vehicle.`;
      } else if (updates.status==='hold') {
        msg += `\n\n⏸️ Your vehicle is currently *On Hold*.`;
      }
      msg += `\n\n👤 Advisor: *${job.advisor||'-'}*\n🔧 Technician: *${updates.mechanic||job.mechanic||'Being assigned'}*`;
      if (note) msg += `\n📝 Note: ${note}`;
      msg += `\n\nWe will notify you at every step! 🔥 *Toufan Garage*`;
    }
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  }
}

function sendWA(id) {
  const job = Object.values(allJobs).find(j=>j.id===id) || allJobs[id];

  const sc = STATUS_CFG[job.status]||{label:'In Progress'};

}

function addSvcLine(desc='', qty=1, price='') {
  const list = document.getElementById('nj-services-list');
  if (!list) return;
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:1fr 80px 90px 32px;gap:6px;margin-bottom:6px;align-items:center;';

    <button onclick="this.parentElement.remove();calcJobTotal();" style="background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:var(--red);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:14px;line-height:1;">✕</button>`;

function calcJobTotal() {
  const qtys = [...document.querySelectorAll('.svc-qty')].map(i=>parseFloat(i.value)||0);
  const prices = [...document.querySelectorAll('.svc-price')].map(i=>parseFloat(i.value)||0);
  let sub = 0;
  qtys.forEach((q,i) => sub += q * prices[i]);
  const vatRadio = document.querySelector('input[name="nj-vat"]:checked');
  const includeVat = !vatRadio || vatRadio.value === 'yes';
  const vat = includeVat ? sub * 0.05 : 0;
  const total = sub + vat;
  const subEl = document.getElementById('nj-subtotal');
  const vatEl = document.getElementById('nj-vat-amt');
  const totEl = document.getElementById('nj-total');
  if (subEl) subEl.textContent = 'AED ' + sub.toFixed(2);
  if (vatEl) vatEl.textContent = 'AED ' + vat.toFixed(2);
  if (totEl) totEl.textContent = 'AED ' + total.toFixed(2);
  return {sub, vat, total, includeVat};
}

async function saveNewJob(notify) {
  const plate = document.getElementById('nj-plate')?.value.trim();
  if (!plate) { showToast('Enter plate number'); return; }
  // Capture services with qty and price
  const svcDescs = [...document.querySelectorAll('.svc-line')].map(i=>i.value);
  const svcQtys = [...document.querySelectorAll('.svc-qty')].map(i=>parseFloat(i.value)||1);
  const svcPrices = [...document.querySelectorAll('.svc-price')].map(i=>parseFloat(i.value)||0);
  const serviceItems = svcDescs.map((d,i)=>({desc:d,qty:svcQtys[i],price:svcPrices[i]})).filter(i=>i.desc);
  const services = serviceItems.map(i => i.price > 0 ? `${i.desc} (x${i.qty} @ AED ${i.price})` : i.desc);
  const subtotalAmount = serviceItems.reduce((s,i)=>s+(i.qty*i.price),0);
  const vatRadio = document.querySelector('input[name="nj-vat"]:checked');
  const includeVat = !vatRadio || vatRadio.value === 'yes';
  const vatAmount = includeVat ? subtotalAmount * 0.05 : 0;
  const totalAmount = subtotalAmount + vatAmount;
  const mechEl = document.getElementById('nj-mechanic');
  const advEl = document.getElementById('nj-advisor');
  const mechUid = mechEl?.value || '';
  const mechName = mechUid ? (mechEl.options[mechEl.selectedIndex]?.dataset?.name || mechEl.options[mechEl.selectedIndex]?.text || '') : '';
  const advUid = advEl?.value || currentUser?.uid;
  const advName = advEl ? (advEl.options[advEl.selectedIndex]?.dataset?.name || advEl.options[advEl.selectedIndex]?.text || '') : currentProfile?.name;
  const branch = document.getElementById('nj-branch')?.value || currentProfile?.branch;

  const jcNum = Date.now();
  const jobId = 'JC-' + jcNum.toString().slice(-5);

  const job = {
    id: jobId, branch, plate,
    vehicle: document.getElementById('nj-vehicle')?.value || '',
    year: document.getElementById('nj-year')?.value || '',
    mileage: document.getElementById('nj-mileage')?.value || '',
    customer: document.getElementById('nj-customer')?.value || '',
    phone: document.getElementById('nj-phone')?.value || '',
    services, status: document.getElementById('nj-status')?.value || 'diagnostic',
    priority: document.getElementById('nj-priority')?.value || 'normal',
    type: document.getElementById('nj-type')?.value || 'mechanical',
    advisor: advName, advisorUid: advUid,
    mechanic: mechName, mechanicUid: mechUid,
    notes: document.getElementById('nj-notes')?.value || '',
    invoice: '', amount: totalAmount, subtotal: subtotalAmount, vatAmount, includeVat, serviceItems, paid: false,
    createdAt: Date.now(), createdBy: currentUser?.uid,
    log: [{time:nowTime(), msg:`Job created by ${currentProfile?.name}`}]
  };

  await db.ref('jobs/' + jobId).set(job);
  closeOverlay('overlay-job');
  showToast(jobId + ' created!');

  // Notify mechanic
  if (mechUid && mechName) {
    const mechProfile = Object.values(allStaff).find(s=>s.uid===mechUid);
    if (mechProfile?.phone) {
      const mMsg = `🔧 Dear ${mechName}, you have been assigned a new job!\n\nJob: *${jobId}*\n🚗 Vehicle: *${job.vehicle}* (${plate})\n⚙️ Services: ${services.join(', ')}\n📍 Branch: ${BRANCHES[branch]}\n\nCheck the workshop board! 🔥 *Toufan*`;
      setTimeout(() => window.open(`https://wa.me/${mechProfile.phone.replace(/\D/g,'')}?text=${encodeURIComponent(mMsg)}`,'_blank'), 500);
    }
  }

  if (notify && job.phone) {
    const phone = job.phone.replace(/\D/g,'');
    const sc = STATUS_CFG[job.status];
    const msg = `Dear ${job.customer||'Valued Customer'}, your *${job.vehicle}* (${plate}) has been received at *${BRANCHES[branch]}*.\n\nJob Card: *${jobId}*\nStatus: *${sc?.label}*\nTechnician: *${mechName||'Being assigned'}*\n\nWe will keep you updated every step! 🔥\n\n*Toufan Garage* · TRN: 104126278100003`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  }
}

// ============ DISPATCH BOARD ============
function filterDispatch(v) { dispatchFilter = v; renderDispatch(); }

function renderDispatch() {
  let jobs = Object.values(allJobs).filter(j=>j.status!=='paid');
  let staff = Object.values(allStaff).filter(s=>['mechanic','tyres','supervisor'].includes(s.role));
  if (dispatchFilter !== 'all') {
    jobs = jobs.filter(j=>j.branch===dispatchFilter);
    staff = staff.filter(s=>s.branch===dispatchFilter);
  }
  const container = document.getElementById('dispatch-cols');
  const cols = staff.map(s => {
    const sJobs = jobs.filter(j=>j.mechanicUid===s.uid);
    const color = s.color || STAFF_COLORS[0];
    return `<div class="d-col">
      <div class="d-col-head">
        <div><div class="d-mech" style="color:${color}">${s.name.split(' ')[0]}</div><div class="d-role">${s.role} · ${BRANCHES[s.branch]?.split(' ')[1]||s.branch}</div></div>
        <div class="d-cnt">${sJobs.length}</div>
      </div>
      <div class="d-col-body">
        ${sJobs.length ? sJobs.map(j=>{
          const sc = STATUS_CFG[j.status]||{};
          return `<div class="d-job st-${j.status}" onclick="openUpdateModal('${j.id}')">
            <div class="d-plate">${j.plate}</div>
            <div class="d-car">${j.vehicle}</div>
            <div style="margin-top:4px;"><span class="badge b-${j.status}">${sc.icon||''} ${sc.label||j.status}</span></div>
            <div class="d-svc">${(j.services||[]).slice(0,2).join(' · ')}${(j.services||[]).length>2?' +'+((j.services||[]).length-2)+' more':''}</div>
          </div>`;
        }).join('') : `<div style="text-align:center;padding:20px 10px;color:var(--text3);font-size:11px;">No jobs</div>`}
      </div>
    </div>`;
  });
  // Unassigned column
  const unassigned = jobs.filter(j=>!j.mechanicUid||!staff.find(s=>s.uid===j.mechanicUid));
  cols.unshift(`<div class="d-col">
    <div class="d-col-head"><div><div class="d-mech" style="color:var(--text3)">Unassigned</div><div class="d-role">Pending</div></div><div class="d-cnt" style="color:var(--red)">${unassigned.length}</div></div>
    <div class="d-col-body">
      ${unassigned.length ? unassigned.map(j=>`<div class="d-job st-${j.status}" onclick="openUpdateModal('${j.id}')"><div class="d-plate">${j.plate}</div><div class="d-car">${j.vehicle}</div><span class="badge b-${j.status}">${STATUS_CFG[j.status]?.icon||''} ${STATUS_CFG[j.status]?.label||j.status}</span></div>`).join('') : `<div style="text-align:center;padding:20px;color:var(--text3);font-size:11px;">All assigned ✅</div>`}
    </div>
  </div>`);
  container.innerHTML = cols.join('');
}

// ============ CREATE STAFF (Firebase Auth) ============
async function createStaffUser() {
  const name = document.getElementById('ns-name').value.trim();
  const email = document.getElementById('ns-email').value.trim();
  const pass = document.getElementById('ns-pass').value;
  const role = document.getElementById('ns-role').value;
  const branch = document.getElementById('ns-branch').value;
  const phone = document.getElementById('ns-phone').value.trim();
  document.getElementById('staff-err').textContent = '';
  if (!name||!email||!pass) { document.getElementById('staff-err').textContent = 'Fill all required fields'; return; }
  if (pass.length < 6) { document.getElementById('staff-err').textContent = 'Password must be 6+ characters'; return; }

  try {
    // Create secondary auth (doesn't sign out current user)
    const secApp = firebase.initializeApp(firebaseConfig, 'secondary_' + Date.now());
    const secAuth = secApp.auth();
    const cred = await secAuth.createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;
    const colorIdx = Object.values(allStaff).filter(s=>s.branch===branch).length;
    await db.ref('staff/' + uid).set({
      uid, name, email, role, branch, phone,
      color: STAFF_COLORS[colorIdx % STAFF_COLORS.length],
      createdAt: Date.now()
    });
    await secAuth.signOut();
    await secApp.delete();
    closeOverlay('overlay-add-staff');
    showToast(name + ' account created!');
    renderStaffTab();
  } catch(e) {
    document.getElementById('staff-err').textContent = e.message;
  }
}

// ============ RESET PASSWORD ============
let resetTargetUid = '';

function openResetPassword(uid, name) {
  if (!uid || uid === 'undefined') {
    showToast('Cannot reset — no UID found for this user');
    return;
  }
  resetTargetUid = uid;
  document.getElementById('reset-staff-name').textContent = 'Resetting password for: ' + name;
  document.getElementById('new-pwd').value = '';
  document.getElementById('confirm-pwd').value = '';
  document.getElementById('reset-err').textContent = '';
  openOverlay('overlay-reset-pwd');
}

async function doResetPassword() {
  const newPwd = document.getElementById('new-pwd').value;
  const confirmPwd = document.getElementById('confirm-pwd').value;
  document.getElementById('reset-err').textContent = '';

  if (!newPwd || newPwd.length < 6) {
    document.getElementById('reset-err').textContent = 'Password must be at least 6 characters';
    return;
  }
  if (newPwd !== confirmPwd) {
    document.getElementById('reset-err').textContent = 'Passwords do not match';
    return;
  }

  try {
    // Use secondary app to reset without affecting current session
    const secApp = firebase.initializeApp(firebaseConfig, 'reset_' + Date.now());
    const secAuth = secApp.auth();
    // Get staff email
    const staffEntry = Object.values(allStaff).find(s => s.uid === resetTargetUid);
    if (!staffEntry?.email) {
      document.getElementById('reset-err').textContent = 'Email not found for this user';
      return;
    }
    // Send password reset email via Firebase Auth admin API isn't available client-side
    // Instead use Firebase Auth sendPasswordResetEmail
    await auth.sendPasswordResetEmail(staffEntry.email);
    await secApp.delete();
    closeOverlay('overlay-reset-pwd');
    showToast('Password reset email sent to ' + staffEntry.email + '!');
  } catch(e) {
    document.getElementById('reset-err').textContent = e.message;
  }
}

async function fixAllStaffFromExcel() {
  if (!confirm('Update all staff names, roles, branches and phones from the official spreadsheet?')) return;
  showToast('Fixing staff data...');
  const snap = await db.ref('staff').once('value');
  const current = snap.val() || {};
  const updates = {};
  let fixed = 0;
  Object.entries(current).forEach(([key, s]) => {
    const email = (s.email || '').toLowerCase().trim();
    const correct = CORRECT_STAFF_DATA[email];
    if (correct) {
      updates['staff/' + key + '/name'] = correct.name;
      updates['staff/' + key + '/role'] = correct.role;
      updates['staff/' + key + '/branch'] = correct.branch;
      if (correct.phone) updates['staff/' + key + '/phone'] = correct.phone;
      fixed++;
    }
  });
  if (fixed === 0) { showToast('No staff matched. Check Firebase has staff loaded.'); return; }
  await db.ref().update(updates);
  showToast('✅ ' + fixed + ' staff updated!');
  renderStaffTab();
}

async function seedInventoryIfEmpty() {
  const snap = await db.ref('inventory').once('value');
  if (snap.exists() && Object.keys(snap.val()||{}).length > 10) return; // already seeded
  console.log('Seeding', Object.keys(INVENTORY_SEED).length, 'parts...');
  const batch = {};
  Object.entries(INVENTORY_SEED).forEach(([id,part]) => { batch[id] = part; });
  await db.ref('inventory').update(batch);
  console.log('Inventory seeded!');
  showToast('Inventory loaded: ' + Object.keys(INVENTORY_SEED).length + ' parts!');
}

// ============================
// INVENTORY MODULE
// ============================
let invBranchFilter = 'all';
let invSearchFilter = '';

function listenToInventory() {
  db.ref('inventory').on('value', snap => {
    appData.inventory = snap.val() || {};
    const active = document.querySelector('.page.active');
    if (active && active.id === 'page-inventory') renderInventory();
    updateLowStockAlert();
  });
}

function updateLowStockAlert() {
  const parts = Object.values(appData.inventory || {});
  const low = parts.filter(p => {
    const stock = getBranchStock(p, invBranchFilter);
    return stock <= (p.minStock || 0);
  });
  // Update home stat if visible
  const el = document.getElementById('inv-stat-low');
  if (el) el.textContent = low.length;
}

function getBranchStock(part, branch) {
  if (branch === 'all') return (part.stockTAC||0) + (part.stockTASC||0) + (part.stockTAS||0);
  if (branch === 'TAC') return part.stockTAC||0;
  if (branch === 'TASC') return part.stockTASC||0;
  if (branch === 'TAS') return part.stockTAS||0;
  return 0;
}

function setInvBranch(branch, el) {
  invBranchFilter = branch;
  document.querySelectorAll('.inv-filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderInventory();
}


function calcSellingPrice() {
  const cost = parseFloat(document.getElementById('item-cost')?.value)||0;
  const marginEl = document.getElementById('item-margin');
  let margin = parseFloat(marginEl?.value)||40;
  if (marginEl?.value === 'custom') {
    margin = parseFloat(prompt('Enter custom margin %:')||'40');
  }
  const sellExVat = cost * (1 + margin/100);
  const sellIncVat = sellExVat * 1.05;
  const profit = sellExVat - cost;
  const exEl = document.getElementById('item-price-ex');
  const inEl = document.getElementById('item-price');
  if (exEl) exEl.value = sellExVat.toFixed(2);
  if (inEl) inEl.value = sellIncVat.toFixed(2);
  const cs = document.getElementById('price-cost-show');
  const ps = document.getElementById('price-profit-show');
  const fs = document.getElementById('price-final-show');
  if (cs) cs.textContent = 'AED ' + cost.toFixed(2);
  if (ps) ps.textContent = 'AED ' + profit.toFixed(2);
  if (fs) fs.textContent = 'AED ' + sellIncVat.toFixed(2);
}

function calcSellingPriceFromSell() {
  const sellEx = parseFloat(document.getElementById('item-price-ex')?.value)||0;
  const sellInc = sellEx * 1.05;
  const cost = parseFloat(document.getElementById('item-cost')?.value)||0;
  const profit = sellEx - cost;
  const inEl = document.getElementById('item-price');
  if (inEl) inEl.value = sellInc.toFixed(2);
  const cs = document.getElementById('price-cost-show');
  const ps = document.getElementById('price-profit-show');
  const fs = document.getElementById('price-final-show');
  if (cs) cs.textContent = 'AED ' + cost.toFixed(2);
  if (ps) ps.textContent = 'AED ' + profit.toFixed(2);
  if (fs) fs.textContent = 'AED ' + sellInc.toFixed(2);
}

function filterInventory(val) {
  invSearchFilter = val.toLowerCase();
  renderInventory();
}

function renderInventory() {
  const role = currentProfile?.role;
  const addBtn = document.getElementById('add-part-btn');
  if (addBtn) addBtn.style.display = ['admin','manager','supervisor','inventory'].includes(role) ? '' : 'none';

  // Render branch filter buttons
  const filterDiv = document.getElementById('inv-branch-filter');
  if (filterDiv && !filterDiv.children.length) {
    filterDiv.innerHTML = ['all','TAC','TASC','TAS'].map((b,i) => {
      const labels = ['All Branches','Auto Care','Auto Services','Al Shmal'];
      return `<button class="inv-filter-btn ${b===invBranchFilter?'active':''}" onclick="setInvBranch('${b}',this)">${labels[i]}</button>`;
    }).join('');
  }

  const parts = Object.values(appData.inventory || {});
  let filtered = parts;
  if (invSearchFilter) {
    filtered = parts.filter(p =>
      (p.name||'').toLowerCase().includes(invSearchFilter) ||
      (p.partNo||'').toLowerCase().includes(invSearchFilter) ||
      (p.carMake||'').toLowerCase().includes(invSearchFilter) ||
      (p.carModel||'').toLowerCase().includes(invSearchFilter) ||
      (p.category||'').toLowerCase().includes(invSearchFilter)
    );
  }

  const total = filtered.length;
  const low = filtered.filter(p => getBranchStock(p, invBranchFilter) <= (p.minStock||0) && getBranchStock(p, invBranchFilter) > 0).length;
  const outOf = filtered.filter(p => getBranchStock(p, invBranchFilter) === 0).length;
  const needOrder = filtered.filter(p => getBranchStock(p, invBranchFilter) <= (p.minStock||0)).length;
  const fast = filtered.filter(p => p.fastMoving).length;

  document.getElementById('inv-stat-total').textContent = total;
  document.getElementById('inv-stat-low').textContent = low + outOf;
  document.getElementById('inv-stat-order').textContent = needOrder;
  document.getElementById('inv-stat-fast').textContent = fast;

  const list = document.getElementById('inventory-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">No parts found</div>';
    return;
  }

  // Sort: out of stock first, then low, then ok
  filtered.sort((a,b) => {
    const sa = getBranchStock(a, invBranchFilter);
    const sb = getBranchStock(b, invBranchFilter);
    const ma = a.minStock||0, mb = b.minStock||0;
    if (sa === 0 && sb > 0) return -1;
    if (sb === 0 && sa > 0) return 1;
    if (sa <= ma && sb > mb) return -1;
    if (sb <= mb && sa > ma) return 1;
    return (a.name||'').localeCompare(b.name||'');
  });

  list.innerHTML = filtered.map(p => {
    const totalStock = getBranchStock(p, 'all');
    const branchStock = getBranchStock(p, invBranchFilter);
    const minStock = p.minStock || 0;
    const isOut = branchStock === 0;
    const isLow = branchStock > 0 && branchStock <= minStock;
    const cardClass = isOut ? 'low' : isLow ? 'order' : 'ok';
    const stockColor = isOut ? 'var(--red)' : isLow ? 'var(--orange)' : 'var(--green)';
    const statusLabel = isOut ? '❌ OUT OF STOCK' : isLow ? '⚠️ LOW STOCK' : '✅ IN STOCK';
    return `<div class="part-card ${cardClass}" onclick="openPartDetail('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="part-name">${p.name}</div>
          <div class="part-num">${p.partNo||''} ${p.barcode?'· '+p.barcode:''}</div>
          <div class="part-car">${p.carMake||''} ${p.carModel||''} ${p.yearFrom?p.yearFrom+'-'+(p.yearTo||''):''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:${stockColor}">${statusLabel}</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:${stockColor}">${branchStock}</div>
          <div style="font-size:9px;color:var(--text3);">MIN: ${minStock}</div>
        </div>
      </div>
      <div class="stock-pills">
        <div class="stock-pill"><div class="stock-pill-label">Auto Care</div><div class="stock-pill-val" style="color:${(p.stockTAC||0)<=minStock?'var(--red)':'var(--green)'}">${p.stockTAC||0}</div></div>
        <div class="stock-pill"><div class="stock-pill-label">Auto Svc</div><div class="stock-pill-val" style="color:${(p.stockTASC||0)<=minStock?'var(--red)':'var(--green)'}">${p.stockTASC||0}</div></div>
        <div class="stock-pill"><div class="stock-pill-label">Al Shmal</div><div class="stock-pill-val" style="color:${(p.stockTAS||0)<=minStock?'var(--red)':'var(--green)'}">${p.stockTAS||0}</div></div>
        <div class="stock-pill"><div class="stock-pill-label">Category</div><div class="stock-pill-val" style="font-size:11px;color:var(--text2)">${p.category||'-'}</div></div>
        ${p.fastMoving?'<div class="stock-pill"><div class="stock-pill-label">Fast</div><div class="stock-pill-val" style="font-size:11px;color:var(--gold)">⚡ YES</div></div>':''}
      </div>
      ${isOut||isLow ? `<div class="notify-bar">
        <span class="notify-bar-msg">📢 ${isOut?'OUT OF STOCK':'LOW STOCK'} — notify advisors?</span>
        <button onclick="event.stopPropagation();notifyAdvisors('${p.id}')" class="btn btn-wa" style="padding:5px 12px;font-size:11px;width:auto;">📲 Notify</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

      ${isOut||isLow?`<button class="btn btn-gold" onclick="notifyAdvisors('${id}',true)">🚨 Alert: Part ${isOut?'Out of Stock':'Low'}</button>`:''}
    </div>`;
  openOverlay('overlay-detail');
}

async function adjustStock(partId, key, delta) {
  const part = (appData.inventory||{})[partId];
  if (!part) return;
  const newVal = Math.max(0, (part[key]||0) + delta);
  await db.ref('inventory/' + partId + '/' + key).set(newVal);
  showToast('Stock updated');
}

function notifyAdvisors(partId, urgent) {
  const p = (appData.inventory||{})[partId];
  if (!p) return;
  const advisors = Object.values(allStaff).filter(s => ['advisor','manager','supervisor'].includes(s.role) && s.phone);
  if (!advisors.length) { showToast('No advisor phones found'); return; }
  const totalStock = (p.stockTAC||0)+(p.stockTASC||0)+(p.stockTAS||0);
  const isOut = totalStock === 0;
  const msg = isOut
    ? `🚨 *STOCK ALERT* 🚨\n\nPart *${p.name}* (${p.partNo||''}) is *OUT OF STOCK* across all branches.\n\nPlease advise customers accordingly and arrange reorder from *${p.supplier||'supplier'}*.\n\n🔥 Toufan Inventory System`
    : `⚠️ *LOW STOCK ALERT*\n\nPart *${p.name}* (${p.partNo||''}) stock is low:\n• Auto Care: ${p.stockTAC||0}\n• Auto Services: ${p.stockTASC||0}\n• Al Shmal: ${p.stockTAS||0}\n\nMin level: ${p.minStock||0} · Reorder from: ${p.supplier||'-'}\n\n🔥 Toufan Inventory System`;

  // Open WA for first advisor, show toast for others
  const first = advisors[0];
  window.open('https://wa.me/' + first.phone.replace(/\D/g,'') + '?text=' + encodeURIComponent(msg), '_blank');
  if (advisors.length > 1) {
    setTimeout(() => {
      advisors.slice(1).forEach((a,i) => {
        setTimeout(() => window.open('https://wa.me/' + a.phone.replace(/\D/g,'') + '?text=' + encodeURIComponent(msg), '_blank'), i*800);
      });
    }, 1000);
  }
  showToast('Notifying ' + advisors.length + ' advisor(s)!');
  closeOverlay('overlay-detail');
}

function addQuoteLine() { addQuoteLineItem('',1,0,0); }

function addQuoteLineItem(desc='', qty=1, cost=0, sell=0) {
  const list = document.getElementById('qq-items-list');
  if (!list) return;
  const margin = parseFloat(document.getElementById('qq-margin')?.value)||40;
  const autoSell = sell || (cost > 0 ? +(cost * qty * (1 + margin/100)).toFixed(2) : 0);
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:2fr 55px 85px 85px 85px 28px;gap:5px;margin-bottom:6px;align-items:center;';
  div.innerHTML = `
    <input type="text" class="form-control qq-desc" placeholder="Part / service..." value="${desc}" style="font-size:12px;padding:7px 9px;">
    <input type="number" class="form-control qq-qty" value="${qty}" min="1" oninput="recalcLine(this)" style="font-size:12px;padding:7px;text-align:center;">
    <input type="number" class="form-control qq-cost" value="${cost||''}" placeholder="Cost" oninput="recalcLine(this)" style="font-size:12px;padding:7px;text-align:right;color:var(--red);">
    <div style="background:var(--s2);border-radius:6px;padding:7px;text-align:right;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold);" class="qq-profit-show">+0%</div>
    <input type="number" class="form-control qq-sell" value="${autoSell||''}" placeholder="Sell" oninput="calcQuoteTotal()" style="font-size:12px;padding:7px;text-align:right;color:var(--green);font-weight:700;">
    <button onclick="this.parentElement.remove();calcQuoteTotal();" style="background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:var(--red);border-radius:6px;padding:5px 6px;cursor:pointer;font-size:12px;line-height:1;">✕</button>`;
  list.appendChild(div);
  updateLineProfit(div);
}

function recalcLine(input) {
  const row = input.closest('div[style*="grid"]');
  if (!row) return;
  const cost = parseFloat(row.querySelector('.qq-cost')?.value)||0;
  const qty = parseFloat(row.querySelector('.qq-qty')?.value)||1;
  const margin = parseFloat(document.getElementById('qq-margin')?.value)||40;
  const sellInput = row.querySelector('.qq-sell');
  if (cost > 0 && sellInput) {
    const newSell = +(cost * qty * (1 + margin/100)).toFixed(2);
    sellInput.value = newSell;
  }
  updateLineProfit(row);
  calcQuoteTotal();
}

function updateLineProfit(row) {
  const cost = parseFloat(row.querySelector('.qq-cost')?.value)||0;
  const qty = parseFloat(row.querySelector('.qq-qty')?.value)||1;
  const sell = parseFloat(row.querySelector('.qq-sell')?.value)||0;
  const profitShow = row.querySelector('.qq-profit-show');
  if (profitShow && cost > 0 && sell > 0) {
    const totalCost = cost * qty;
    const profit = sell - totalCost;
    const pct = ((profit / totalCost) * 100).toFixed(0);
    profitShow.textContent = (profit >= 0 ? '+' : '') + 'AED ' + profit.toFixed(0);
    profitShow.style.color = profit >= 0 ? 'var(--gold)' : 'var(--red)';
  } else if (profitShow) {
    profitShow.textContent = '-';
    profitShow.style.color = 'var(--text3)';
  }
}

function recalcAllQuoteLines() {
  document.querySelectorAll('#qq-items-list > div').forEach(row => {
    const costInput = row.querySelector('.qq-cost');
    if (costInput) recalcLine(costInput);
  });
}

function calcQuoteTotal() {
  const qtys = [...document.querySelectorAll('.qq-qty')].map(i=>parseFloat(i.value)||0);
  const costs = [...document.querySelectorAll('.qq-cost')].map(i=>parseFloat(i.value)||0);
  const sells = [...document.querySelectorAll('.qq-sell')].map(i=>parseFloat(i.value)||0);

  let totalCost = 0, totalSell = 0;
  qtys.forEach((q,i) => { totalCost += q * costs[i]; });
  sells.forEach(s => totalSell += s);

  // Update all profit shows
  document.querySelectorAll('#qq-items-list > div').forEach(row => updateLineProfit(row));

  const disc = parseFloat(document.getElementById('qq-discount')?.value)||0;
  const vat = document.getElementById('qq-vat')?.value === 'yes' ? (totalSell - disc) * 0.05 : 0;
  const finalTotal = totalSell - disc + vat;
  const totalProfit = totalSell - totalCost;

  const setCost = document.getElementById('qq-total-cost');
  const setProfit = document.getElementById('qq-total-profit');
  const setSell = document.getElementById('qq-total-sell');
  const setFinal = document.getElementById('qq-final-total');
  if (setCost) setCost.textContent = 'AED ' + totalCost.toFixed(2);
  if (setProfit) { setProfit.textContent = 'AED ' + totalProfit.toFixed(2); setProfit.style.color = totalProfit >= 0 ? 'var(--gold)' : 'var(--red)'; }
  if (setSell) setSell.textContent = 'AED ' + totalSell.toFixed(2);
  if (setFinal) setFinal.textContent = 'AED ' + finalTotal.toFixed(2);
}

async function saveQuotation(editId, printAfter) {
  const customer = document.getElementById('qq-customer')?.value.trim();
  if (!customer) { showToast('Enter customer name'); return null; }
  const descs = [...document.querySelectorAll('.qq-desc')].map(i=>i.value);
  const qtys = [...document.querySelectorAll('.qq-qty')].map(i=>parseFloat(i.value)||1);
  const costs = [...document.querySelectorAll('.qq-cost')].map(i=>parseFloat(i.value)||0);
  const sells = [...document.querySelectorAll('.qq-sell')].map(i=>parseFloat(i.value)||0);
  const items = descs.map((d,i)=>({desc:d,qty:qtys[i],cost:costs[i],sell:sells[i]})).filter(i=>i.desc);

  let totalCost=0, totalSell=0;
  items.forEach(i=>{ totalCost += i.qty * i.cost; totalSell += i.sell; });
  const disc = parseFloat(document.getElementById('qq-discount')?.value)||0;
  const vat = document.getElementById('qq-vat')?.value === 'yes' ? (totalSell-disc)*0.05 : 0;
  const finalTotal = totalSell - disc + vat;
  const margin = parseFloat(document.getElementById('qq-margin')?.value)||40;

  const id = editId || ('QT-'+Date.now());
  const quote = {
    id, quoteNo: document.getElementById('qq-no')?.value||id,
    date: document.getElementById('qq-date')?.value||todayStr(),
    branch: document.getElementById('qq-branch')?.value||currentProfile?.branch,
    validDays: parseInt(document.getElementById('qq-valid')?.value)||7,
    customer, phone: document.getElementById('qq-phone')?.value||'',
    vehicle: document.getElementById('qq-vehicle')?.value||'',
    plate: document.getElementById('qq-plate')?.value||'',
    items, margin,
    discount: disc, vat: document.getElementById('qq-vat')?.value||'no',
    vatAmt: vat, totalCost, totalSell, finalTotal,
    notes: document.getElementById('qq-notes')?.value||'',
    status: document.getElementById('qq-status')?.value||'pending',
    createdAt: editId?((allCashierData.quotations||{})[editId]?.createdAt||Date.now()):Date.now(),
    createdBy: currentProfile?.name
  };
  await db.ref('cashier/quotations/'+id).set(quote);
  closeOverlay('overlay-job');
  showToast('Quotation saved!');
  if (printAfter) setTimeout(()=>printQuotation(id), 400);
  return quote;
}

function autoQuoteNo() {
  const count = Object.keys(allCashierData.quotations||{}).length + 1;
  return 'QT-' + String(count).padStart(4,'0');
}

function exportQuotationsCSV() {
  const quotes = Object.values(allCashierData.quotations||{});
  const rows = [['Quote No','Date','Customer','Phone','Vehicle','Plate','Branch','Items','Total Cost','Total Sell','Profit','Final Total','Margin %','Status','Valid Days']];
  quotes.forEach(q => {
    const profit = (q.totalSell||0)-(q.totalCost||0);
    rows.push([q.quoteNo||q.id,q.date||'',q.customer||'',q.phone||'',q.vehicle||'',q.plate||'',BRANCHES[q.branch]||'',(q.items||[]).map(i=>i.desc).join('; '),(q.totalCost||0).toFixed(2),(q.totalSell||0).toFixed(2),profit.toFixed(2),(q.finalTotal||0).toFixed(2),q.margin||40,q.status||'pending',q.validDays||7]);
  });
  downloadCSV(rows,'toufan_quotations_'+todayStr()+'.csv');
}

let allCashierData = { invoices:{}, expenses:{}, purchases:{} };

function listenToCashier() {
  db.ref('cashier').on('value', snap => {
    const d = snap.val() || {};
    allCashierData = {
      invoices: d.invoices || {},
      expenses: d.expenses || {},
      purchases: d.purchases || {}
    };
    if (document.querySelector('.page.active')?.id === 'page-cashier') renderCashier();
  });
}

function switchCashierTab(tab, el) {
  cashierTab = tab;
  document.querySelectorAll('#page-cashier .btab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCashier();
}

function renderCashier() {
  const role = currentProfile?.role;
  const branch = currentProfile?.branch || 'all';
  const canEdit = ['admin','manager','cashier','supervisor'].includes(role);
  const c = document.getElementById('cashier-content');
  if (!c) return;

  if (cashierTab === 'invoices') renderCashierInvoices(canEdit, branch);
  else if (cashierTab === 'quotations') renderQuotations(canEdit, branch);
  else if (cashierTab === 'expenses') renderCashierExpenses(canEdit, branch);
  else if (cashierTab === 'purchases') renderCashierPurchases(canEdit, branch);
  else if (cashierTab === 'summary') renderCashierSummary(branch);
  else if (cashierTab === 'commission') renderCommission(branch);
}

      <button class="btn btn-ghost btn-sm" onclick="exportInvoicesCSV()">📥 Export</button>
    </div>
    <div id="invoice-list-inner">
    ${sorted.length ? sorted.map(inv => `
      <div class="card" onclick="openInvoiceDetail('${inv.id}')">
        <div class="card-row">
          <div>
            <div class="card-title" style="color:var(--gold)">${inv.invNo||inv.id}</div>

function addInvLine(desc='', qty=1, price=0) {
  const list = document.getElementById('ci-items-list');
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:2fr 60px 80px 30px;gap:6px;margin-bottom:6px;align-items:center;';
  div.innerHTML = `
    <input type="text" class="form-control ci-desc" placeholder="Description" value="${desc}" style="font-size:12px;padding:8px;">
    <input type="number" class="form-control ci-qty" value="${qty}" min="1" oninput="calcInvTotal()" style="font-size:12px;padding:8px;text-align:center;">
    <input type="number" class="form-control ci-price" value="${price}" oninput="calcInvTotal()" style="font-size:12px;padding:8px;">
    <button onclick="this.parentElement.remove();calcInvTotal();" style="background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.3);color:var(--red);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12px;">✕</button>`;
  list.appendChild(div);
}

function calcInvTotal() {
  const qtys = [...document.querySelectorAll('.ci-qty')].map(i=>parseFloat(i.value)||0);
  const prices = [...document.querySelectorAll('.ci-price')].map(i=>parseFloat(i.value)||0);
  let sub = 0;
  qtys.forEach((q,i) => sub += q * prices[i]);
  const disc = parseFloat(document.getElementById('ci-discount')?.value)||0;
  const vat = document.getElementById('ci-vat')?.value === 'yes' ? (sub-disc)*0.05 : 0;
  const total = sub - disc + vat;
  if(document.getElementById('ci-subtotal')) document.getElementById('ci-subtotal').textContent = 'AED '+sub.toFixed(2);
  if(document.getElementById('ci-disc-show')) document.getElementById('ci-disc-show').textContent = '- AED '+disc.toFixed(2);
  if(document.getElementById('ci-vat-show')) document.getElementById('ci-vat-show').textContent = 'AED '+vat.toFixed(2);
  if(document.getElementById('ci-total')) document.getElementById('ci-total').textContent = 'AED '+total.toFixed(2);
}

function getInvTotal() {
  const qtys = [...document.querySelectorAll('.ci-qty')].map(i=>parseFloat(i.value)||0);
  const prices = [...document.querySelectorAll('.ci-price')].map(i=>parseFloat(i.value)||0);
  let sub = 0; qtys.forEach((q,i)=>sub+=q*prices[i]);
  const disc = parseFloat(document.getElementById('ci-discount')?.value)||0;
  const vat = document.getElementById('ci-vat')?.value === 'yes' ? (sub-disc)*0.05 : 0;
  return {sub, disc, vat, total: sub-disc+vat};
}

async function saveInvoice(editId, share) {
  const customer = document.getElementById('ci-customer')?.value.trim();
  if(!customer){showToast('Enter customer name');return null;}
  const descs = [...document.querySelectorAll('.ci-desc')].map(i=>i.value);
  const qtys = [...document.querySelectorAll('.ci-qty')].map(i=>parseFloat(i.value)||0);
  const prices = [...document.querySelectorAll('.ci-price')].map(i=>parseFloat(i.value)||0);
  const items = descs.map((d,i)=>({desc:d,qty:qtys[i],price:prices[i]})).filter(i=>i.desc);
  const {sub,disc,vat,total} = getInvTotal();
  const id = editId || ('INV-'+Date.now());
  const inv = {
    id, invNo: document.getElementById('ci-invno')?.value||id,
    date: document.getElementById('ci-date')?.value||todayStr(),
    branch: document.getElementById('ci-branch')?.value||currentProfile?.branch,
    jcNo: document.getElementById('ci-jcno')?.value||'',
    customer, phone: document.getElementById('ci-phone')?.value||'',
    vehicle: document.getElementById('ci-vehicle')?.value||'',
    plate: document.getElementById('ci-plate')?.value||'',
    items, discount: disc, vat: document.getElementById('ci-vat')?.value,
    subtotal: sub, vatAmt: vat, total,
    status: document.getElementById('ci-status')?.value||'unpaid',
    payMethod: document.getElementById('ci-paymethod')?.value||'cash',
    notes: document.getElementById('ci-notes')?.value||'',
    createdAt: editId ? (allCashierData.invoices[editId]?.createdAt||Date.now()) : Date.now(),
    createdBy: currentProfile?.name
  };
  await db.ref('cashier/invoices/'+id).set(inv);
  closeOverlay('overlay-job');
  showToast('Invoice saved!');
  return inv;
}

function renderCashierExpenses(canEdit, branch) {
  const exps = Object.values(allCashierData.expenses);
  const filtered = branch==='all' ? exps : exps.filter(e=>e.branch===branch);
  const sorted = filtered.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const total = sorted.reduce((s,e)=>s+(e.amount||0),0);
  document.getElementById('cashier-content').innerHTML = `
    <div class="stats-grid" style="margin-bottom:12px;">
      <div class="stat-box"><div class="stat-label">Total Expenses</div><div class="stat-val" style="color:var(--red)">${sorted.length}</div></div>
      <div class="stat-box"><div class="stat-label">Total Amount</div><div class="stat-val" style="color:var(--red);font-size:16px;">AED ${total.toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-label">This Month</div><div class="stat-val" style="color:var(--orange);font-size:16px;">AED ${sorted.filter(e=>e.date&&e.date.startsWith(thisMonth())).reduce((s,e)=>s+(e.amount||0),0).toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-label">Today</div><div class="stat-val" style="color:var(--orange);font-size:16px;">AED ${sorted.filter(e=>e.date===todayStr()).reduce((s,e)=>s+(e.amount||0),0).toLocaleString()}</div></div>
    </div>
    ${canEdit?`<button class="btn btn-gold" style="width:100%;margin-bottom:12px;" onclick="openExpenseModal()">+ Record Expense</button>`:''}
    ${sorted.length ? sorted.map(e=>`
      <div class="card" onclick="${canEdit?`openExpenseModal('${e.id}')`:''}">
        <div class="card-row">
          <div>
            <div class="card-title">${e.category||'Expense'}</div>
            <div class="card-sub">${e.description||'-'}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px;">${e.date||''} · ${e.payMethod||''} · ${BRANCHES[e.branch]?.split(' ').slice(1,3).join(' ')||e.branch||''}</div>
            ${e.receipt?`<div style="font-size:10px;color:var(--cyan);margin-top:2px;">📎 Receipt: ${e.receipt}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--red)">AED ${(e.amount||0).toLocaleString()}</div>
            <div style="font-size:10px;color:var(--text3);">${e.recordedBy||''}</div>
          </div>
        </div>
      </div>`).join('') : '<div style="text-align:center;padding:30px;color:var(--text3);">No expenses recorded</div>'}`;
}

function openExpenseModal(editId) {
  const exp = editId ? allCashierData.expenses[editId] : null;
  document.getElementById('job-modal-title').textContent = exp ? 'Edit Expense' : 'Record Expense';
  document.getElementById('job-modal-body').innerHTML = `
    <div class="form-section">
      <div class="fsec-title">Expense Details</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category</label>
          <select class="form-control" id="ce-cat">
            ${['Rent','Utilities','Salaries','Parts Purchase','Tools & Equipment','Marketing','Fuel','Insurance','Maintenance','Cleaning','Office Supplies','Other'].map(c=>`<option ${exp?.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Amount (AED)</label><input type="number" class="form-control" id="ce-amount" value="${exp?.amount||''}" placeholder="0.00"></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><input type="text" class="form-control" id="ce-desc" value="${exp?.description||''}" placeholder="Details of expense..."></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-control" id="ce-date" value="${exp?.date||todayStr()}"></div>
        <div class="form-group"><label class="form-label">Branch</label>
          <select class="form-control" id="ce-branch">
            ${Object.entries(BRANCHES).map(([k,v])=>`<option value="${k}" ${(exp?.branch||currentProfile?.branch||'TAC')===k?'selected':''}>${v.split(' ').slice(1,3).join(' ')}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Payment Method</label>
          <select class="form-control" id="ce-pay">
            ${['Cash','Credit / Debit Card','Bank Transfer','Tabby','Tamara','Yusr','Cheque'].map(m=>`<option ${exp?.payMethod===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Receipt / Ref No.</label><input type="text" class="form-control" id="ce-receipt" value="${exp?.receipt||''}" placeholder="Receipt number"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="ce-notes" placeholder="Additional notes...">${exp?.notes||''}</textarea></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-gold" onclick="saveExpense('${editId||''}')">💾 Save Expense</button>
      ${editId?`<button class="btn" style="background:rgba(255,23,68,.15);color:var(--red);border:1px solid rgba(255,23,68,.3);" onclick="deleteExpense('${editId}')">🗑 Delete</button>`:''}
    </div>`;
  openOverlay('overlay-job');
}

async function saveExpense(editId) {
  const amount = parseFloat(document.getElementById('ce-amount')?.value)||0;
  if(!amount){showToast('Enter amount');return;}
  const id = editId||('EXP-'+Date.now());
  await db.ref('cashier/expenses/'+id).set({
    id, category: document.getElementById('ce-cat')?.value,
    amount, description: document.getElementById('ce-desc')?.value||'',
    date: document.getElementById('ce-date')?.value||todayStr(),
    branch: document.getElementById('ce-branch')?.value||currentProfile?.branch,
    payMethod: document.getElementById('ce-pay')?.value||'Cash',
    receipt: document.getElementById('ce-receipt')?.value||'',
    notes: document.getElementById('ce-notes')?.value||'',
    recordedBy: currentProfile?.name,
    createdAt: editId?(allCashierData.expenses[editId]?.createdAt||Date.now()):Date.now()
  });
  closeOverlay('overlay-job');
  showToast('Expense saved!');
}

async function deleteExpense(id) {
  await db.ref('cashier/expenses/'+id).remove();
  closeOverlay('overlay-job');
  showToast('Expense deleted');
}

function addPurLine(desc='',qty=1,cost=0) {
  const list = document.getElementById('cp-items-list');
  const div = document.createElement('div');
  div.style.cssText='display:grid;grid-template-columns:2fr 60px 70px 30px;gap:6px;margin-bottom:6px;align-items:center;';

    <input type="number" class="form-control cp-cost" value="${cost}" oninput="calcPurTotal()" style="font-size:12px;padding:8px;">

  list.appendChild(div);
}

function calcPurTotal() {
  const qtys=[...document.querySelectorAll('.cp-qty')].map(i=>parseFloat(i.value)||0);
  const costs=[...document.querySelectorAll('.cp-cost')].map(i=>parseFloat(i.value)||0);
  let total=0; qtys.forEach((q,i)=>total+=q*costs[i]);
  const el=document.getElementById('cp-total');
  if(el) el.textContent='AED '+total.toFixed(2);
}

async function savePurchase(editId) {
  const supplier=document.getElementById('cp-supplier')?.value.trim();
  if(!supplier){showToast('Enter supplier name');return;}
  const descs=[...document.querySelectorAll('.cp-desc')].map(i=>i.value);
  const qtys=[...document.querySelectorAll('.cp-qty')].map(i=>parseFloat(i.value)||0);
  const costs=[...document.querySelectorAll('.cp-cost')].map(i=>parseFloat(i.value)||0);
  const items=descs.map((d,i)=>({desc:d,qty:qtys[i],cost:costs[i]})).filter(i=>i.desc);
  let total=0; items.forEach(i=>total+=i.qty*i.cost);
  const id=editId||('PO-'+Date.now());
  await db.ref('cashier/purchases/'+id).set({
    id, poNo:document.getElementById('cp-pono')?.value||id,
    date:document.getElementById('cp-date')?.value||todayStr(),
    supplier, branch:document.getElementById('cp-branch')?.value||currentProfile?.branch,
    items, totalCost:total,
    status:document.getElementById('cp-status')?.value||'pending',
    ref:document.getElementById('cp-ref')?.value||'',
    notes:document.getElementById('cp-notes')?.value||'',
    recordedBy:currentProfile?.name,
    createdAt:editId?(allCashierData.purchases[editId]?.createdAt||Date.now()):Date.now()
  });
  closeOverlay('overlay-job');
  showToast('Purchase order saved!');
}

async function deletePurchase(id) {
  await db.ref('cashier/purchases/'+id).remove();
  closeOverlay('overlay-job');
  showToast('Purchase deleted');
}
