function renderCashierSummary(branch) {
  const invs=Object.values(allCashierData.invoices).filter(i=>branch==='all'||i.branch===branch);
  const exps=Object.values(allCashierData.expenses).filter(e=>branch==='all'||e.branch===branch);
  const purs=Object.values(allCashierData.purchases).filter(p=>branch==='all'||p.branch===branch);
  const thisM=thisMonth();
  const revenue=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(i.total||0),0);
  const outstanding=invs.filter(i=>i.status!=='paid').reduce((s,i)=>s+(i.total||0),0);
  const expenses=exps.reduce((s,e)=>s+(e.amount||0),0);
  const purchases=purs.reduce((s,p)=>s+(p.totalCost||0),0);
  const profit=revenue-expenses-purchases;
  const mRevenue=invs.filter(i=>i.status==='paid'&&i.date?.startsWith(thisM)).reduce((s,i)=>s+(i.total||0),0);
  const mExpenses=exps.filter(e=>e.date?.startsWith(thisM)).reduce((s,e)=>s+(e.amount||0),0);

  // Category breakdown
  const expCats={};
  exps.forEach(e=>{expCats[e.category||'Other']=(expCats[e.category||'Other']||0)+(e.amount||0);});

  document.getElementById('cashier-content').innerHTML=`

      <div class="stat-box"><div class="stat-label">Net Profit</div><div class="stat-val" style="color:${profit>=0?'var(--green)':'var(--red)'};font-size:18px;">AED ${profit.toLocaleString()}</div></div>
    </div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">This Month</div>
    <div class="stats-grid" style="margin-bottom:16px;">
      <div class="stat-box"><div class="stat-label">Month Revenue</div><div class="stat-val" style="color:var(--green);font-size:18px;">AED ${mRevenue.toLocaleString()}</div></div>

      <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;">EXPENSES BY CATEGORY</div>
      ${Object.entries(expCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`

let allReminders = {};
let remFilter = 'all';

function listenToReminders() {
  db.ref('oilReminders').on('value', snap => {
    allReminders = snap.val() || {};
    if (document.querySelector('.page.active')?.id === 'page-reminders') renderOilReminders();
    updateReminderBadge();
  });
}

function updateReminderBadge() {
  const due = Object.values(allReminders).filter(r => getReminderStatus(r) !== 'ok').length;
  // Could update nav badge here
}

function getReminderStatus(r) {
  const current = parseInt(r.currentMileage)||0;
  const next = parseInt(r.nextOilChangeMileage)||0;
  const diff = next - current;
  if (diff <= 0) return 'overdue';
  if (diff <= 1000) return 'due';
  if (r.lastNotifiedDate === todayStr()) return 'notified';
  return 'ok';
}

function setRemFilter(f, el) {
  remFilter = f;
  document.querySelectorAll('#rem-filter-bar .inv-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderOilReminders();
}

function renderOilReminders() {
  const search = (document.getElementById('rem-search')?.value||'').toLowerCase();
  let rems = Object.values(allReminders);

  // Filter by status
  if (remFilter !== 'all') rems = rems.filter(r => getReminderStatus(r) === remFilter);

  // Filter by search
  if (search) rems = rems.filter(r =>
    (r.customer||'').toLowerCase().includes(search) ||
    (r.plate||'').toLowerCase().includes(search) ||
    (r.vehicle||'').toLowerCase().includes(search) ||
    (r.phone||'').toLowerCase().includes(search)
  );

  // Sort: overdue first, then due, then ok
  const order = {overdue:0,due:1,notified:2,ok:3};
  rems.sort((a,b) => (order[getReminderStatus(a)]||3) - (order[getReminderStatus(b)]||3));

  // Stats
  const all = Object.values(allReminders);
  document.getElementById('rem-stat-total').textContent = all.length;
  document.getElementById('rem-stat-due').textContent = all.filter(r=>getReminderStatus(r)==='due').length;
  document.getElementById('rem-stat-over').textContent = all.filter(r=>getReminderStatus(r)==='overdue').length;
  document.getElementById('rem-stat-sent').textContent = all.filter(r=>r.lastNotifiedDate===todayStr()).length;

  const list = document.getElementById('oil-reminders-list');
  if (!rems.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">No reminders found.<br><br>Oil change reminders are created automatically when a job with oil change is marked as paid.</div>';
    return;
  }

  list.innerHTML = rems.map(r => {
    const status = getReminderStatus(r);
    const diff = (r.nextOilChangeMileage||0) - (r.currentMileage||0);
    const statusColor = status==='overdue'?'var(--red)':status==='due'?'var(--orange)':status==='notified'?'var(--green)':'var(--text3)';
    const statusLabel = status==='overdue'?'🔴 OVERDUE':status==='due'?'🟠 DUE SOON':status==='notified'?'✅ NOTIFIED':'🟢 OK';
    const borderColor = status==='overdue'?'var(--red)':status==='due'?'var(--orange)':status==='notified'?'var(--green)':'var(--border)';
    return `<div style="background:var(--s1);border:1px solid var(--border);border-left:3px solid ${borderColor};border-radius:10px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;">${r.customer||'Unknown'}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${r.vehicle||''} · <span style="color:var(--cyan)">${r.plate||''}</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px;">${r.phone||''} · Last service: ${r.lastServiceDate||'-'}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;color:${statusColor}">${statusLabel}</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:${statusColor}">${diff>=0?'+'+diff.toLocaleString():diff.toLocaleString()}</div>
          <div style="font-size:9px;color:var(--text3);">km remaining</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0;">
        <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Last Oil Change</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;">${(r.lastOilChangeMileage||0).toLocaleString()} km</div>
        </div>
        <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Current</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;">${(r.currentMileage||0).toLocaleString()} km</div>
        </div>
        <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Next Due At</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:${statusColor}">${(r.nextOilChangeMileage||0).toLocaleString()} km</div>
        </div>
      </div>
      ${r.lastNotifiedDate ? `<div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Last notified: ${r.lastNotifiedDate}</div>` : ''}
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${r.phone ? `<button onclick="sendOilChangeReminder('${r.id}')" class="btn btn-wa btn-sm" style="width:auto;flex:1;">📲 Send WhatsApp Reminder</button>` : ''}
        <button onclick="openEditReminder('${r.id}')" class="btn btn-ghost btn-sm" style="width:auto;">✏️ Edit</button>
        <button onclick="updateCurrentMileage('${r.id}')" class="btn btn-ghost btn-sm" style="width:auto;">📍 Update KM</button>
        <button onclick="deleteReminder('${r.id}')" style="background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.25);color:var(--red);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;">🗑</button>
      </div>
    </div>`;
  }).join('');
}

async function sendOilChangeReminder(id) {
  const r = allReminders[id];
  if (!r || !r.phone) return;
  const diff = (r.nextOilChangeMileage||0) - (r.currentMileage||0);
  const isOverdue = diff <= 0;
  const msg = isOverdue
    ? `Dear ${r.customer}, your *${r.vehicle}* (${r.plate}) is *OVERDUE for an oil change!*\n\n🔴 Your oil change was due at *${(r.nextOilChangeMileage||0).toLocaleString()} km*\n📍 Current mileage: approximately *${(r.currentMileage||0).toLocaleString()} km*\n\nPlease visit us as soon as possible to protect your engine!\n\n📍 *${BRANCHES[r.branch]||'Toufan Garage'}*\n📞 Book now and we'll get you sorted quickly!\n\n🔥 *Toufan Garage* · Deira, Dubai`
    : `Dear ${r.customer}, your *${r.vehicle}* (${r.plate}) is due for an oil change soon! 🛢️\n\n✅ Last oil change: *${(r.lastOilChangeMileage||0).toLocaleString()} km*\n⏳ Next due at: *${(r.nextOilChangeMileage||0).toLocaleString()} km*\n📊 Remaining: approximately *${diff.toLocaleString()} km*\n\nDon't wait too long — regular oil changes keep your engine healthy and save you money in the long run!\n\n📅 Book your appointment today:\n📍 *${BRANCHES[r.branch]||'Toufan Garage'}* · Deira, Dubai\n\n🔥 *Toufan Garage*`;

  window.open('https://wa.me/'+r.phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank');
  await db.ref('oilReminders/'+id).update({ lastNotifiedDate: todayStr(), notifyCount: (r.notifyCount||0)+1 });
  showToast('Reminder sent to '+r.customer+'!');
}

async function sendAllDueReminders() {
  const due = Object.values(allReminders).filter(r => ['overdue','due'].includes(getReminderStatus(r)) && r.phone);
  if (!due.length) { showToast('No due reminders to send'); return; }
  showToast('Sending '+due.length+' reminders...');
  due.forEach((r,i) => setTimeout(() => sendOilChangeReminder(r.id), i*1200));
}

            <option value="15000" ${r?.interval==15000?'selected':''}>15,000 km</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Next Oil Change Due At (km)</label>
          <input type="number" class="form-control" id="or-nextmile" value="${r?.nextOilChangeMileage||''}" placeholder="Auto-calculated" style="color:var(--gold);">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Oil Type Used</label><input type="text" class="form-control" id="or-oiltype" value="${r?.oilType||''}" placeholder="e.g. 5W-30 ENEOS, 5W-40 Castrol..."></div>
      <div class="form-group"><label class="form-label">Job Card Reference</label><input type="text" class="form-control" id="or-jcno" value="${r?.jcNo||''}" placeholder="JC-XXXXX"></div>
    </div>
    <button class="btn btn-gold" onclick="saveOilReminder('${editId||''}')">💾 Save Reminder</button>`;
  openOverlay('overlay-job');
}

function calcNextOilChange() {
  const last = parseInt(document.getElementById('or-lastmile')?.value)||0;
  const interval = parseInt(document.getElementById('or-interval')?.value)||10000;
  if (last > 0) {
    const next = last + interval;
    const el = document.getElementById('or-nextmile');
    if (el) el.value = next;
  }
}

async function saveOilReminder(editId) {
  const customer = document.getElementById('or-customer')?.value.trim();
  if (!customer) { showToast('Enter customer name'); return; }
  const lastMile = parseInt(document.getElementById('or-lastmile')?.value)||0;
  const interval = parseInt(document.getElementById('or-interval')?.value)||10000;
  const id = editId || ('OIL-'+Date.now());
  const rem = {
    id, customer,
    phone: document.getElementById('or-phone')?.value||'',
    vehicle: document.getElementById('or-vehicle')?.value||'',
    plate: document.getElementById('or-plate')?.value||'',
    branch: document.getElementById('or-branch')?.value||currentProfile?.branch,
    lastServiceDate: document.getElementById('or-date')?.value||todayStr(),
    lastOilChangeMileage: lastMile,
    currentMileage: parseInt(document.getElementById('or-curmile')?.value)||lastMile,
    interval,
    nextOilChangeMileage: parseInt(document.getElementById('or-nextmile')?.value)||(lastMile+interval),
    oilType: document.getElementById('or-oiltype')?.value||'',
    jcNo: document.getElementById('or-jcno')?.value||'',
    createdAt: editId?(allReminders[editId]?.createdAt||Date.now()):Date.now(),
    createdBy: currentProfile?.name,
    notifyCount: editId?(allReminders[editId]?.notifyCount||0):0,
    lastNotifiedDate: editId?(allReminders[editId]?.lastNotifiedDate||''):''
  };
  await db.ref('oilReminders/'+id).set(rem);
  closeOverlay('overlay-job');
  showToast('Oil reminder saved!');
}

async function updateCurrentMileage(id) {
  const r = allReminders[id];
  if (!r) return;
  const newMile = prompt(`Update current mileage for ${r.customer}\n${r.vehicle} (${r.plate})\n\nCurrent: ${(r.currentMileage||0).toLocaleString()} km\n\nEnter new mileage:`);
  if (!newMile || isNaN(newMile)) return;
  await db.ref('oilReminders/'+id).update({ currentMileage: parseInt(newMile) });
  showToast('Mileage updated!');
}

async function deleteReminder(id) {
  if (!confirm('Delete this oil change reminder?')) return;
  await db.ref('oilReminders/'+id).remove();
  showToast('Reminder deleted');
}

async function autoCreateOilReminder(job, amount) {
  if (!job.phone && !job.customer) return;
  const mileage = parseInt(job.mileage)||0;
  const interval = 10000;
  const id = 'OIL-'+job.id;
  // Check if already exists
  const snap = await db.ref('oilReminders/'+id).once('value');
  const existing = snap.val();
  const rem = {
    id,
    customer: job.customer||'',
    phone: job.phone||'',
    vehicle: (job.vehicle||''),
    plate: job.plate||'',
    branch: job.branch,
    lastServiceDate: todayStr(),
    lastOilChangeMileage: mileage,
    currentMileage: mileage,
    interval,
    nextOilChangeMileage: mileage + interval,
    oilType: (job.services||[]).find(s=>/oil/i.test(s))||'',
    jcNo: job.id,
    createdAt: existing?.createdAt||Date.now(),
    createdBy: currentProfile?.name,
    notifyCount: existing?.notifyCount||0,
    lastNotifiedDate: existing?.lastNotifiedDate||''
  };
  await db.ref('oilReminders/'+id).set(rem);
  showToast('Oil reminder auto-created for '+job.customer+'!');
}

function exportRemindersCSV() {
  const rems = Object.values(allReminders);
  const rows = [['Customer','Phone','Vehicle','Plate','Branch','Last Service','Last Oil Change KM','Current KM','Next Due KM','KM Remaining','Status','Oil Type','Job Card','Last Notified']];
  rems.forEach(r => {
    const diff = (r.nextOilChangeMileage||0)-(r.currentMileage||0);
    rows.push([r.customer||'',r.phone||'',r.vehicle||'',r.plate||'',BRANCHES[r.branch]||r.branch||'',r.lastServiceDate||'',r.lastOilChangeMileage||0,r.currentMileage||0,r.nextOilChangeMileage||0,diff,getReminderStatus(r),r.oilType||'',r.jcNo||'',r.lastNotifiedDate||'']);
  });
  downloadCSV(rows,'toufan_oil_reminders_'+todayStr()+'.csv');
}

// ============================
// COMMISSION CALCULATOR
// ============================
function renderCommission(branch) {
  const role = currentProfile?.role;
  const invoices = Object.values(allCashierData.invoices||{}).filter(i=>i.status==='paid');
  const jobs = Object.values(allJobs);

  // Get all mechanics
  let mechanics = Object.values(allStaff).filter(s=>['mechanic','tyres','bodywork','electrician'].includes(s.role));
  if (branch !== 'all') mechanics = mechanics.filter(s=>s.branch===branch);

  // Build commission per mechanic
  const commData = mechanics.map(m => {
    // Find jobs assigned to this mechanic
    const myJobs = jobs.filter(j=>j.mechanicUid===m.uid||j.mechanic===m.name);
    const completedJobs = myJobs.filter(j=>j.status==='paid'||j.paid);
    // Sum invoice amounts linked to their job cards
    let totalSales = 0;
    completedJobs.forEach(j => {
      const inv = invoices.find(i=>i.jcNo===j.id||i.plate===j.plate);
      if (inv) totalSales += inv.total||0;
      else if (j.amount) totalSales += j.amount;
    });
    const commRate = m.commRate || 3; // default 3%
    const commAmt = totalSales * commRate / 100;
    return { ...m, totalJobs: myJobs.length, completedJobs: completedJobs.length, totalSales, commRate, commAmt };
  }).sort((a,b)=>b.totalSales-a.totalSales);

  const totalComm = commData.reduce((s,m)=>s+m.commAmt,0);
  const totalSales = commData.reduce((s,m)=>s+m.totalSales,0);

  document.getElementById('cashier-content').innerHTML = `
    <div class="stats-grid" style="margin-bottom:12px;">
      <div class="stat-box"><div class="stat-label">Total Mechanics</div><div class="stat-val" style="color:var(--cyan)">${commData.length}</div></div>
      <div class="stat-box"><div class="stat-label">Total Sales</div><div class="stat-val" style="color:var(--green);font-size:16px;">AED ${Math.round(totalSales).toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-label">Total Commission</div><div class="stat-val" style="color:var(--gold);font-size:16px;">AED ${Math.round(totalComm).toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-label">Paid 15th of Month</div><div class="stat-val" style="color:var(--text2);font-size:12px;">Auto Calc</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" onclick="exportCommissionCSV()">📥 Export CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="printCommission()">🖨 Print</button>
    </div>
    <div id="comm-table">
    ${commData.length ? commData.map(m => {
      const initials = m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const color = m.color||'#00d4ff';
      return `<div class="card" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:50%;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;flex-shrink:0;">${initials}</div>
          <div style="flex:1;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;">${m.name}</div>
            <div style="font-size:11px;color:var(--text3);">${m.role} · ${BRANCHES[m.branch]?.split(' ').slice(1,3).join(' ')||m.branch}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold)">AED ${Math.round(m.commAmt).toLocaleString()}</div>
            <div style="font-size:10px;color:var(--text3);">${m.commRate}% of AED ${Math.round(m.totalSales).toLocaleString()}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;">
          <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Jobs</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--cyan)">${m.totalJobs}</div>
          </div>
          <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Completed</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--green)">${m.completedJobs}</div>
          </div>
          <div style="background:var(--s2);border-radius:6px;padding:6px;text-align:center;">
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;">Sales</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold)">AED ${Math.round(m.totalSales).toLocaleString()}</div>
          </div>
        </div>
        ${['admin','manager'].includes(role) ? `<div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--text2);">Commission Rate:</span>
          <input type="number" value="${m.commRate}" min="0" max="10" step="0.5"
            onchange="updateCommRate('${m.uid||m.name}',this.value)"
            style="width:60px;background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:13px;text-align:center;">
          <span style="font-size:11px;color:var(--text2);">%</span>
        </div>` : ''}
      </div>`;
    }).join('') : '<div style="text-align:center;padding:30px;color:var(--text3);">No mechanic data</div>'}
    </div>`;
}

async function updateCommRate(uid, rate) {
  // Find staff by uid or name
  const staffRef = Object.entries(allStaff).find(([k,s])=>s.uid===uid||s.name===uid);
  if (staffRef) {
    await db.ref('staff/'+staffRef[0]+'/commRate').set(parseFloat(rate)||0);
    showToast('Commission rate updated!');
  }
}

function exportCommissionCSV() {
  const rows = [['Name','Role','Branch','Jobs','Completed','Total Sales (AED)','Commission Rate %','Commission Amount (AED)']];
  document.querySelectorAll('#comm-table .card').forEach(card => {
    const name = card.querySelector('[style*="font-size:16px"]')?.textContent?.trim()||'';
    const role = card.querySelector('[style*="font-size:11px"]')?.textContent?.split('·')[0]?.trim()||'';
    const branch = card.querySelector('[style*="font-size:11px"]')?.textContent?.split('·')[1]?.trim()||'';
    const nums = [...card.querySelectorAll('[style*="font-size:18px"]')].map(e=>e.textContent.trim());
    const sales = card.querySelector('[style*="font-size:14px"]')?.textContent?.replace(/[^0-9.]/g,'')||'0';
    const comm = card.querySelector('[style*="font-size:20px"]')?.textContent?.replace(/[^0-9.]/g,'')||'0';
    const rate = card.querySelector('input[type="number"]')?.value||'3';
    rows.push([name,role,branch,nums[0]||'',nums[1]||'',sales,rate,comm]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'toufan_commission_'+todayStr()+'.csv';
  a.click();
  showToast('Commission exported!');
}

function printCommission() {
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>Toufan Commission Report</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px;}
  h2{color:#f0a500;}table{width:100%;border-collapse:collapse;margin-top:16px;}
  th{background:#0a0a0a;color:#f0a500;padding:8px;text-align:left;font-size:11px;}
  td{padding:8px;border-bottom:1px solid #eee;font-size:12px;}
  .total{font-weight:bold;font-size:14px;}</style></head><body>
  <h2>🔥 TOUFAN GARAGE — Commission Report</h2>
  <p>Date: ${new Date().toLocaleDateString('en-AE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
  <table><thead><tr><th>#</th><th>Name</th><th>Role</th><th>Branch</th><th>Jobs</th><th>Sales (AED)</th><th>Rate</th><th>Commission (AED)</th></tr></thead><tbody>`);
  let i=1, totalComm=0, totalSales=0;
  document.querySelectorAll('#comm-table .card').forEach(card => {
    const name=card.querySelector('[style*="font-size:16px"]')?.textContent?.trim()||'';
    const sub=card.querySelector('[style*="font-size:11px"]')?.textContent||'';
    const role=sub.split('·')[0]?.trim()||'';
    const branch=sub.split('·')[1]?.trim()||'';
    const nums=[...card.querySelectorAll('[style*="font-size:18px"]')].map(e=>e.textContent.trim());
    const sales=parseFloat(card.querySelector('[style*="font-size:14px"]')?.textContent?.replace(/[^0-9.]/g,'')||0);
    const comm=parseFloat(card.querySelector('[style*="font-size:20px"]')?.textContent?.replace(/[^0-9.]/g,'')||0);
    const rate=card.querySelector('input[type="number"]')?.value||'3';
    totalSales+=sales; totalComm+=comm;
    w.document.write(`<tr><td>${i++}</td><td>${name}</td><td>${role}</td><td>${branch}</td><td>${nums[0]||0}</td><td>${sales.toLocaleString()}</td><td>${rate}%</td><td style="font-weight:bold;color:#c47000;">${comm.toLocaleString()}</td></tr>`);
  });
  w.document.write(`<tr class="total"><td colspan="5">TOTAL</td><td>AED ${Math.round(totalSales).toLocaleString()}</td><td></td><td>AED ${Math.round(totalComm).toLocaleString()}</td></tr>`);
  w.document.write(`</tbody></table><p style="margin-top:20px;font-size:10px;color:#999;">Generated by Toufan Workshop System · TRN: 104126278100003</p></body></html>`);
  w.document.close(); w.print();
}

function exportJobsCSV() {
  const jobs = getMyJobs();
  const rows = [['Job ID','Plate','Vehicle','Year','Customer','Phone','Branch','Advisor','Mechanic','Services','Status','Priority','Amount','Date']];
  jobs.forEach(j => rows.push([j.id,j.plate,j.vehicle,j.year||'',j.customer||'',j.phone||'',BRANCHES[j.branch]||j.branch,j.advisor||'',j.mechanic||'',(j.services||[]).join('; '),j.status,j.priority||'',j.amount||0,j.createdAt?new Date(j.createdAt).toLocaleDateString('en-AE'):'']));
  downloadCSV(rows,'toufan_jobs_'+todayStr()+'.csv');
}

function exportInvoicesCSV() {
  const invs = Object.values(allCashierData.invoices||{});
  const rows = [['Invoice No','Date','Customer','Phone','Vehicle','Plate','Branch','Job Card','Items','Subtotal','Discount','VAT','Total','Status','Payment Method']];
  invs.forEach(i => rows.push([i.invNo||i.id,i.date||'',i.customer||'',i.phone||'',i.vehicle||'',i.plate||'',BRANCHES[i.branch]||i.branch||'',i.jcNo||'',(i.items||[]).map(x=>x.desc+' x'+x.qty).join('; '),i.subtotal||0,i.discount||0,i.vatAmt||0,i.total||0,i.status||'',i.payMethod||'']));
  downloadCSV(rows,'toufan_invoices_'+todayStr()+'.csv');
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r=>r.map(v=>'"'+(String(v).replace(/"/g,'""'))+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  showToast('Exported!');
}

  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id.replace('page-','');
  if (id==='reception') renderReception();
  else if (id==='dispatch') renderDispatch();
}, 30000);
